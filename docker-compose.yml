services:
  usuario:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery-usuario
    restart: unless-stopped
    ports:
      - "9525:9525"
    environment:
      PORT: 9525
      NODE_ENV: production
      JWT_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 10
    # As três credenciais do Infisical vêm do .env (não commitado).
    # O Compose injeta o conteúdo do .env no container.
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
